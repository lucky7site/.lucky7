<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Number Guess – Lucky 7</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050508;--green:#00ff88;--blue:#00c8ff;--red:#ff4466;--gold:#ffd700;--orange:#ff8c00;--text:#e8eaf0;--muted:#7a7d8e;--border:rgba(255,255,255,0.08);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(255,140,0,0.06) 0%,transparent 60%);pointer-events:none;}
.topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(5,5,8,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.back-btn{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--text);}
.page-title{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:var(--orange);}
.bal-chip{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);border-radius:20px;padding:6px 14px;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--green);}
.game-body{display:flex;flex-direction:column;align-items:center;padding:28px 20px;width:100%;gap:22px;}
.info-text{font-size:14px;color:var(--muted);text-align:center;line-height:1.6;}
.odds-badge{background:rgba(255,140,0,0.1);border:1px solid rgba(255,140,0,0.3);border-radius:10px;padding:9px 18px;font-size:13px;color:var(--orange);font-weight:700;}
/* NUMBER GRID — large tappable buttons */
.num-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  width:90%;
  max-width:340px;
}
.num-btn{
  border:2px solid rgba(255,140,0,0.35);
  background:rgba(255,140,0,0.08);
  border-radius:14px;
  padding:16px 0;
  font-family:'Orbitron',sans-serif;
  font-size:20px;
  font-weight:900;
  cursor:pointer;
  text-align:center;
  transition:.2s;
  color:var(--text);
  line-height:1;
}
.num-btn:active{transform:scale(0.9);}
.num-btn.selected{
  background:rgba(255,140,0,0.3);
  border-color:var(--orange);
  color:var(--orange);
  box-shadow:0 0 16px rgba(255,140,0,0.3);
  transform:scale(1.05);
}
.num-btn.correct{background:rgba(0,255,136,0.25);border-color:var(--green);color:var(--green);}
.num-btn.wrong{background:rgba(255,68,102,0.08);border-color:rgba(255,68,102,0.3);color:rgba(255,68,102,0.5);opacity:0.5;}
.bet-row{display:flex;gap:10px;align-items:center;}
.bet-label{font-size:14px;color:var(--muted);font-weight:600;}
.bet-input{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;padding:8px 14px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;width:100px;outline:none;text-align:center;}
.bet-input:focus{border-color:var(--orange);}
.guess-btn{padding:14px 36px;border:none;border-radius:16px;background:linear-gradient(90deg,var(--orange),var(--gold));font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:#000;cursor:pointer;letter-spacing:1px;transition:.2s;}
.guess-btn:disabled{opacity:0.5;pointer-events:none;}
.guess-btn:active{transform:scale(0.95);}
.result-box{width:90%;max-width:340px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:18px;padding:20px;text-align:center;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.result-msg{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;}
.result-detail{font-size:12px;color:var(--muted);}
@keyframes pop{0%{transform:scale(0.8)}60%{transform:scale(1.1)}100%{transform:scale(1)}}
.win-anim{animation:pop .35s ease;}
.hist-wrap{width:90%;max-width:340px;margin-bottom:30px;}
.hist-title{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.hist-list{display:flex;flex-wrap:wrap;gap:6px;}
.h-chip{border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;font-family:'Orbitron',sans-serif;}
.h-w{background:rgba(0,255,136,0.12);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
.h-l{background:rgba(255,68,102,0.12);color:var(--red);border:1px solid rgba(255,68,102,0.2);}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(10,10,20,0.95);border:1px solid var(--border);border-radius:14px;padding:10px 20px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.win{border-color:var(--green);color:var(--green);}
.toast.lose{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>
<header class="topbar">
  <div class="back-btn" onclick="location.href='index.html'">←</div>
  <div class="page-title">🔢 Number Guess</div>
  <div class="bal-chip" id="balChip">🪙 0</div>
</header>
<div class="game-body">
  <div class="info-text">Pick a number from 1–10<br>Guess right → Win <strong style="color:var(--orange)">8x</strong> your bet!</div>
  <div class="odds-badge">🎯 1 in 10 chance · Payout 8x</div>

  <!-- THE NUMBER GRID — 10 big tappable buttons -->
  <div class="num-grid" id="numGrid">
    <!-- Built by JS below -->
  </div>

  <div class="bet-row">
    <span class="bet-label">Bet:</span>
    <input type="number" class="bet-input" id="betAmt" value="10" min="1">
    <span class="bet-label">Coins</span>
  </div>
  <button class="guess-btn" id="guessBtn" onclick="doGuess()">GUESS! 🎯</button>
  <div class="result-box" id="resultBox">
    <div class="result-msg" style="color:var(--muted)">Pick a number and guess!</div>
  </div>
  <div class="hist-wrap">
    <div class="hist-title">History</div>
    <div class="hist-list" id="histList"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyClNX5DPD55Lhj_N-UwfWtD5VssOZQZ9qw",
  authDomain:"lucky7-64a59.firebaseapp.com",
  projectId:"lucky7-64a59",
  storageBucket:"lucky7-64a59.firebasestorage.app",
  messagingSenderId:"950599334529",
  appId:"1:950599334529:web:ca04176afa45a923532b80"
});
var db = firebase.firestore();
var sessStr = localStorage.getItem('l7_current_user');
if (!sessStr) { location.replace('auth.html'); }
var currentUser; try { currentUser = JSON.parse(sessStr); } catch(e) { location.replace('auth.html'); }
var _balance = parseInt(localStorage.getItem('l7_balance') || '0');
function showBal() { document.getElementById('balChip').textContent = '🪙 ' + _balance; }
function walletDeduct(n) { _balance-=n; if(_balance<0)_balance=0; localStorage.setItem('l7_balance',String(_balance)); showBal(); return db.collection('users').doc(currentUser.id).update({wallet:firebase.firestore.FieldValue.increment(-n)}); }
function walletCredit(n) { _balance+=n; localStorage.setItem('l7_balance',String(_balance)); showBal(); return db.collection('users').doc(currentUser.id).update({wallet:firebase.firestore.FieldValue.increment(n)}); }
db.collection('users').doc(currentUser.id).onSnapshot(function(snap){ if(!snap.exists)return; _balance=snap.data().wallet||0; localStorage.setItem('l7_balance',String(_balance)); showBal(); });

var selected = null;
showBal();

// Build 1–10 number buttons
(function() {
  var grid = document.getElementById('numGrid');
  for (var i=1; i<=10; i++) {
    var b = document.createElement('div');
    b.className = 'num-btn';
    b.textContent = i;
    b.onclick = (function(n){ return function(){ pickNum(n); }; })(i);
    grid.appendChild(b);
  }
})();

function pickNum(n) {
  selected = n;
  document.querySelectorAll('.num-btn').forEach(function(b,i){ b.classList.toggle('selected', i===n-1); });
}

function doGuess() {
  if (selected===null) { showToast('Pick a number first!','lose'); return; }
  var bet = parseInt(document.getElementById('betAmt').value)||10;
  if (bet<1||bet>_balance) { showToast('Not enough coins!','lose'); return; }
  document.getElementById('guessBtn').disabled = true;
  walletDeduct(bet);

  var answer = Math.floor(Math.random()*10)+1;
  var win    = (selected===answer);

  document.querySelectorAll('.num-btn').forEach(function(b,i){
    b.classList.remove('selected');
    if (i===answer-1) b.classList.add('correct');
    else b.classList.add('wrong');
  });

  var rb = document.getElementById('resultBox');
  rb.classList.remove('win-anim'); void rb.offsetWidth; rb.classList.add('win-anim');

  if (win) {
    var payout = bet*8; walletCredit(payout);
    rb.innerHTML='<div style="font-size:28px">🎯</div><div class="result-msg" style="color:var(--green)">PERFECT! +'+payout+' 🪙</div><div class="result-detail">The answer was '+answer+'!</div>';
    showToast('Won '+payout+' Coins! 🎯','win');
    addHist('+'+payout,true);
  } else {
    rb.innerHTML='<div style="font-size:28px">❌</div><div class="result-msg" style="color:var(--red)">WRONG! -'+bet+' 🪙</div><div class="result-detail">You picked '+selected+', answer was '+answer+'</div>';
    showToast('Wrong! Answer was '+answer,'lose');
    addHist('-'+bet,false);
  }

  setTimeout(function(){
    document.querySelectorAll('.num-btn').forEach(function(b){ b.classList.remove('correct','wrong','selected'); });
    selected = null;
    document.getElementById('guessBtn').disabled = false;
    document.getElementById('resultBox').innerHTML='<div class="result-msg" style="color:var(--muted)">Pick a number and guess!</div>';
  },2500);
}

function addHist(label,win){ var l=document.getElementById('histList'); var el=document.createElement('div'); el.className='h-chip '+(win?'h-w':'h-l'); el.textContent=label; l.prepend(el); if(l.children.length>10) l.removeChild(l.lastChild); }
function showToast(msg,type){ var t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+type+' show'; setTimeout(function(){ t.className='toast'; },2500); }
</script>
</body>
</html>
