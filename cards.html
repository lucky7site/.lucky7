<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Card Pick – Lucky 7</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050508;--green:#00ff88;--purple:#b44fff;--blue:#00c8ff;--red:#ff4466;--gold:#ffd700;--text:#e8eaf0;--muted:#7a7d8e;--border:rgba(255,255,255,0.08);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(180,79,255,0.06) 0%,transparent 60%);pointer-events:none;}
.topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(5,5,8,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.back-btn{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--text);}
.page-title{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:var(--purple);}
.bal-chip{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);border-radius:20px;padding:6px 14px;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--green);}
.game-body{display:flex;flex-direction:column;align-items:center;padding:28px 20px;width:100%;gap:22px;}
.info-text{font-size:14px;color:var(--muted);text-align:center;line-height:1.5;}
/* CARDS */
.cards-area{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;padding:10px 0;}
.card{
  width:72px;height:108px;border-radius:14px;
  background:linear-gradient(135deg,#1a0033,#330066,#1a0033);
  border:2px solid rgba(180,79,255,0.5);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;cursor:pointer;transition:.3s;
  box-shadow:0 4px 20px rgba(180,79,255,0.2),inset 0 1px 0 rgba(255,255,255,0.1);
  position:relative;overflow:hidden;
}
.card::before{content:'🃏';font-size:30px;position:absolute;}
.card:hover{transform:translateY(-8px);border-color:var(--purple);box-shadow:0 12px 30px rgba(180,79,255,0.4);}
.card.selected{border-color:var(--gold);box-shadow:0 0 24px rgba(255,215,0,0.5);transform:translateY(-10px);}
.card.selected::before{content:'⭐';color:var(--gold);}
.card.revealed{pointer-events:none;cursor:default;}
.card.revealed::before{content:'';}
.card.revealed-win{background:linear-gradient(135deg,#003322,#006644);border-color:var(--green);box-shadow:0 0 20px rgba(0,255,136,0.4);}
.card.revealed-lose{background:linear-gradient(135deg,#220011,#440022);border-color:var(--red);}
.card.disabled{pointer-events:none;}
/* BUTTONS */
.bet-row{display:flex;gap:10px;align-items:center;}
.bet-label{font-size:14px;color:var(--muted);font-weight:600;}
.bet-input{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;padding:8px 14px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;width:100px;outline:none;text-align:center;}
.bet-input:focus{border-color:var(--purple);}
.reveal-btn{padding:14px 36px;border:none;border-radius:16px;background:linear-gradient(90deg,var(--purple),var(--blue));font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:#fff;cursor:pointer;letter-spacing:1px;transition:.2s;}
.reveal-btn:disabled{opacity:0.5;pointer-events:none;}
.reveal-btn:active{transform:scale(0.95);}
.result-box{width:90%;max-width:320px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:18px;padding:20px;text-align:center;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.result-msg{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;}
@keyframes pop{0%{transform:scale(0.8)}60%{transform:scale(1.1)}100%{transform:scale(1)}}
.win-anim{animation:pop .35s ease;}
.hist-wrap{width:90%;max-width:320px;margin-bottom:30px;}
.hist-title{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.hist-list{display:flex;flex-wrap:wrap;gap:6px;}
.h-chip{border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;font-family:'Orbitron',sans-serif;}
.h-w{background:rgba(0,255,136,0.12);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
.h-l{background:rgba(255,68,102,0.12);color:var(--red);border:1px solid rgba(255,68,102,0.2);}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(10,10,20,0.95);border:1px solid var(--border);border-radius:14px;padding:10px 20px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.win{border-color:var(--green);color:var(--green);}
.toast.lose{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>
<header class="topbar">
  <div class="back-btn" onclick="location.href='index.html'">←</div>
  <div class="page-title">🃏 Card Pick</div>
  <div class="bal-chip" id="balChip">🪙 0</div>
</header>
<div class="game-body">
  <div class="info-text">Pick 1 card from 5<br>Find the 🌟 Star to win <strong style="color:var(--green)">3x</strong>!</div>
  <div class="cards-area" id="cardsArea"></div>
  <div class="bet-row">
    <span class="bet-label">Bet:</span>
    <input type="number" class="bet-input" id="betAmt" value="10" min="1">
    <span class="bet-label">Coins</span>
  </div>
  <button class="reveal-btn" id="revealBtn" onclick="revealCard()">REVEAL CARD 🃏</button>
  <div class="result-box" id="resultBox">
    <div class="result-msg" style="color:var(--muted)">Tap a card to select, then Reveal!</div>
  </div>
  <div class="hist-wrap">
    <div class="hist-title">History</div>
    <div class="hist-list" id="histList"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyClNX5DPD55Lhj_N-UwfWtD5VssOZQZ9qw",
  authDomain:"lucky7-64a59.firebaseapp.com",
  projectId:"lucky7-64a59",
  storageBucket:"lucky7-64a59.firebasestorage.app",
  messagingSenderId:"950599334529",
  appId:"1:950599334529:web:ca04176afa45a923532b80"
});
var db = firebase.firestore();
var sessStr = localStorage.getItem('l7_current_user');
if (!sessStr) { location.replace('auth.html'); }
var currentUser; try { currentUser = JSON.parse(sessStr); } catch(e) { location.replace('auth.html'); }
var _balance = parseInt(localStorage.getItem('l7_balance') || '0');
function showBal() { document.getElementById('balChip').textContent = '🪙 ' + _balance; }
function walletDeduct(n) { _balance-=n; if(_balance<0)_balance=0; localStorage.setItem('l7_balance',String(_balance)); showBal(); return db.collection('users').doc(currentUser.id).update({wallet:firebase.firestore.FieldValue.increment(-n)}); }
function walletCredit(n) { _balance+=n; localStorage.setItem('l7_balance',String(_balance)); showBal(); return db.collection('users').doc(currentUser.id).update({wallet:firebase.firestore.FieldValue.increment(n)}); }
db.collection('users').doc(currentUser.id).onSnapshot(function(snap){ if(!snap.exists)return; _balance=snap.data().wallet||0; localStorage.setItem('l7_balance',String(_balance)); showBal(); });

var selectedCard = null;
var winCard      = null;
var gameActive   = false;
showBal();

function buildCards() {
  selectedCard = null; gameActive = true;
  winCard = Math.floor(Math.random()*5);
  var area = document.getElementById('cardsArea');
  area.innerHTML = '';
  for (var i=0;i<5;i++) {
    var c = document.createElement('div');
    c.className = 'card';
    c.setAttribute('data-idx', i);
    c.onclick = (function(idx){ return function(){ selectCard(idx); }; })(i);
    area.appendChild(c);
  }
  document.getElementById('resultBox').innerHTML = '<div class="result-msg" style="color:var(--muted)">Tap a card to select, then Reveal!</div>';
  document.getElementById('revealBtn').disabled = false;
}
buildCards();

function selectCard(idx) {
  if (!gameActive) return;
  selectedCard = idx;
  document.querySelectorAll('.card').forEach(function(c,i){ c.classList.toggle('selected', i===idx); });
}

function revealCard() {
  if (selectedCard===null) { showToast('Tap a card first!','lose'); return; }
  var bet = parseInt(document.getElementById('betAmt').value)||10;
  if (bet<1||bet>_balance) { showToast('Not enough coins!','lose'); return; }
  gameActive = false;
  document.getElementById('revealBtn').disabled = true;
  walletDeduct(bet);

  document.querySelectorAll('.card').forEach(function(c,i){
    c.classList.add('disabled','revealed');
    c.onclick = null;
    if (i===winCard) {
      c.classList.add('revealed-win');
      c.innerHTML = '<span style="font-size:32px">🌟</span>';
    } else {
      c.classList.add('revealed-lose');
      c.innerHTML = '<span style="font-size:32px">💀</span>';
    }
  });

  var rb = document.getElementById('resultBox');
  rb.classList.remove('win-anim'); void rb.offsetWidth; rb.classList.add('win-anim');

  if (selectedCard===winCard) {
    var payout = bet*3; walletCredit(payout);
    rb.innerHTML = '<div style="font-size:28px">🌟</div><div class="result-msg" style="color:var(--green)">WINNER! +'+payout+' 🪙</div>';
    showToast('Won '+payout+' Coins! 🌟','win');
    addHist('+'+payout,true);
  } else {
    rb.innerHTML = '<div style="font-size:28px">💀</div><div class="result-msg" style="color:var(--red)">WRONG CARD! -'+bet+' 🪙</div>';
    showToast('Wrong card! -'+bet+' Coins','lose');
    addHist('-'+bet,false);
  }
  setTimeout(function(){ buildCards(); },2500);
}

function addHist(label,win){ var l=document.getElementById('histList'); var el=document.createElement('div'); el.className='h-chip '+(win?'h-w':'h-l'); el.textContent=label; l.prepend(el); if(l.children.length>10) l.removeChild(l.lastChild); }
function showToast(msg,type){ var t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+type+' show'; setTimeout(function(){ t.className='toast'; },2500); }
</script>
</body>
</html>
