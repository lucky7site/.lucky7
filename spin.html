<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dice Roll – Lucky 7</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050508;--green:#00ff88;--blue:#00c8ff;--red:#ff4466;--gold:#ffd700;--text:#e8eaf0;--muted:#7a7d8e;--border:rgba(255,255,255,0.08);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(0,255,136,0.06) 0%,transparent 60%);pointer-events:none;}
.topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(5,5,8,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.back-btn{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--text);}
.page-title{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:var(--green);}
.bal-chip{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);border-radius:20px;padding:6px 14px;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--green);}
.game-body{display:flex;flex-direction:column;align-items:center;padding:30px 20px;width:100%;gap:24px;}
.dice-area{display:flex;gap:20px;align-items:center;}
.dice{font-size:64px;transition:transform .1s;user-select:none;filter:drop-shadow(0 0 10px rgba(0,200,255,0.4));line-height:1;}
@keyframes roll{0%{transform:rotate(0deg) scale(1)}25%{transform:rotate(90deg) scale(0.8)}50%{transform:rotate(180deg) scale(1.1)}75%{transform:rotate(270deg) scale(0.9)}100%{transform:rotate(360deg) scale(1)}}
.rolling{animation:roll .15s linear infinite;}
.vs-label{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--muted);}
.predict-section{width:90%;max-width:320px;}
.predict-label{font-size:13px;color:var(--muted);margin-bottom:10px;text-align:center;text-transform:uppercase;letter-spacing:1px;}
.predict-btns{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.p-btn{border:1px solid var(--border);background:rgba(255,255,255,0.06);border-radius:10px;padding:12px 0;font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;cursor:pointer;text-align:center;transition:.2s;color:var(--text);}
.p-btn:active{transform:scale(0.92);}
.p-btn.selected{background:rgba(0,200,255,0.2);border-color:var(--blue);color:var(--blue);}
.bet-row{display:flex;gap:10px;align-items:center;}
.bet-label{font-size:14px;color:var(--muted);font-weight:600;}
.bet-input{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;padding:8px 14px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;width:100px;outline:none;text-align:center;}
.bet-input:focus{border-color:var(--green);}
.roll-btn{padding:14px 36px;border:none;border-radius:16px;background:linear-gradient(90deg,var(--green),var(--blue));font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:#000;cursor:pointer;letter-spacing:1px;transition:.2s;}
.roll-btn:disabled{opacity:0.5;pointer-events:none;}
.roll-btn:active{transform:scale(0.95);}
.result-box{width:90%;max-width:320px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:18px;padding:20px;text-align:center;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.result-emoji{font-size:32px;}
.result-msg{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;}
.result-detail{font-size:12px;color:var(--muted);}
@keyframes pop{0%{transform:scale(0.8)}60%{transform:scale(1.1)}100%{transform:scale(1)}}
.win-anim{animation:pop .35s ease;}
.hist-wrap{width:90%;max-width:320px;margin-bottom:30px;}
.hist-title{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.hist-list{display:flex;flex-wrap:wrap;gap:6px;}
.h-chip{border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;font-family:'Orbitron',sans-serif;}
.h-w{background:rgba(0,255,136,0.12);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
.h-l{background:rgba(255,68,102,0.12);color:var(--red);border:1px solid rgba(255,68,102,0.2);}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(10,10,20,0.95);border:1px solid var(--border);border-radius:14px;padding:10px 20px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.win{border-color:var(--green);color:var(--green);}
.toast.lose{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>
<header class="topbar">
  <div class="back-btn" onclick="location.href='index.html'">←</div>
  <div class="page-title">🎲 Dice Roll</div>
  <div class="bal-chip" id="balChip">🪙 0</div>
</header>
<div class="game-body">
  <div class="dice-area">
    <div class="dice" id="dice1">⚀</div>
    <div class="vs-label">+</div>
    <div class="dice" id="dice2">⚁</div>
  </div>
  <div class="predict-section">
    <div class="predict-label">Pick a number (1–6) — Win 5x!</div>
    <div class="predict-btns" id="predBtns">
      <div class="p-btn" onclick="selectPred(1)">1</div>
      <div class="p-btn" onclick="selectPred(2)">2</div>
      <div class="p-btn" onclick="selectPred(3)">3</div>
      <div class="p-btn" onclick="selectPred(4)">4</div>
      <div class="p-btn" onclick="selectPred(5)">5</div>
      <div class="p-btn" onclick="selectPred(6)">6</div>
    </div>
  </div>
  <div class="bet-row">
    <span class="bet-label">Bet:</span>
    <input type="number" class="bet-input" id="betAmt" value="10" min="1">
    <span class="bet-label">Coins</span>
  </div>
  <button class="roll-btn" id="rollBtn" onclick="rollDice()">ROLL DICE 🎲</button>
  <div class="result-box" id="resultBox">
    <div class="result-emoji">🎲</div>
    <div class="result-msg" style="color:var(--muted)">Pick a number and roll!</div>
  </div>
  <div class="hist-wrap">
    <div class="hist-title">History</div>
    <div class="hist-list" id="histList"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyClNX5DPD55Lhj_N-UwfWtD5VssOZQZ9qw",
  authDomain:"lucky7-64a59.firebaseapp.com",
  projectId:"lucky7-64a59",
  storageBucket:"lucky7-64a59.firebasestorage.app",
  messagingSenderId:"950599334529",
  appId:"1:950599334529:web:ca04176afa45a923532b80"
});
var db = firebase.firestore();
var sessStr = localStorage.getItem('l7_current_user');
if (!sessStr) { location.replace('auth.html'); }
var currentUser; try { currentUser = JSON.parse(sessStr); } catch(e) { location.replace('auth.html'); }
var _balance = parseInt(localStorage.getItem('l7_balance') || '0');
function showBal() { document.getElementById('balChip').textContent = '🪙 ' + _balance; }
function walletDeduct(n) { _balance-=n; if(_balance<0)_balance=0; localStorage.setItem('l7_balance',String(_balance)); showBal(); return db.collection('users').doc(currentUser.id).update({wallet:firebase.firestore.FieldValue.increment(-n)}); }
function walletCredit(n) { _balance+=n; localStorage.setItem('l7_balance',String(_balance)); showBal(); return db.collection('users').doc(currentUser.id).update({wallet:firebase.firestore.FieldValue.increment(n)}); }
db.collection('users').doc(currentUser.id).onSnapshot(function(snap){ if(!snap.exists)return; _balance=snap.data().wallet||0; localStorage.setItem('l7_balance',String(_balance)); showBal(); });

var diceFaces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
var selected  = null;
showBal();

function selectPred(n) {
  selected = n;
  document.querySelectorAll('.p-btn').forEach(function(b,i){ b.classList.toggle('selected', i===n-1); });
}

function rollDice() {
  if (selected===null) { showToast('Pick a number first!','lose'); return; }
  var bet = parseInt(document.getElementById('betAmt').value)||10;
  if (bet<1||bet>_balance) { showToast('Not enough coins!','lose'); return; }
  document.getElementById('rollBtn').disabled = true;
  var d1=document.getElementById('dice1'), d2=document.getElementById('dice2');
  d1.classList.add('rolling'); d2.classList.add('rolling');
  walletDeduct(bet);
  var flips=0;
  var fi=setInterval(function(){
    d1.textContent=diceFaces[Math.floor(Math.random()*6)];
    d2.textContent=diceFaces[Math.floor(Math.random()*6)];
    if(++flips>=14){
      clearInterval(fi);
      d1.classList.remove('rolling'); d2.classList.remove('rolling');
      var r1=Math.floor(Math.random()*6)+1, r2=Math.floor(Math.random()*6)+1;
      d1.textContent=diceFaces[r1-1]; d2.textContent=diceFaces[r2-1];
      document.getElementById('rollBtn').disabled=false;
      finishRoll(bet,r1,r2);
    }
  },80);
}

function finishRoll(bet,r1,r2) {
  var rb=document.getElementById('resultBox');
  var win=(r1===selected||r2===selected);
  rb.classList.remove('win-anim'); void rb.offsetWidth; rb.classList.add('win-anim');
  if(win){
    var payout=bet*5; walletCredit(payout);
    rb.innerHTML='<div class="result-emoji">🎉</div><div class="result-msg" style="color:var(--green)">YOU WIN! +'+payout+' 🪙</div><div class="result-detail">Rolled '+r1+' & '+r2+' — You guessed '+selected+'</div>';
    showToast('Won '+payout+' Coins! 🎉','win');
    addHist('+'+payout,true);
  } else {
    rb.innerHTML='<div class="result-emoji">😢</div><div class="result-msg" style="color:var(--red)">MISS! -'+bet+' 🪙</div><div class="result-detail">Rolled '+r1+' & '+r2+' — You guessed '+selected+'</div>';
    showToast('Missed! -'+bet+' Coins','lose');
    addHist('-'+bet,false);
  }
}

function addHist(label,win){ var l=document.getElementById('histList'); var el=document.createElement('div'); el.className='h-chip '+(win?'h-w':'h-l'); el.textContent=label; l.prepend(el); if(l.children.length>10) l.removeChild(l.lastChild); }
function showToast(msg,type){ var t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+type+' show'; setTimeout(function(){ t.className='toast'; },2500); }
</script>
</body>
</html>
