<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mines Game – Lucky 7</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050508;--green:#00ff88;--blue:#00c8ff;--red:#ff4466;--gold:#ffd700;--text:#e8eaf0;--muted:#7a7d8e;--border:rgba(255,255,255,0.08);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(255,68,102,0.06) 0%,transparent 60%);pointer-events:none;}
.topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(5,5,8,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.back-btn{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--text);}
.page-title{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:var(--red);}
.bal-chip{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);border-radius:20px;padding:6px 14px;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--green);}
.game-body{display:flex;flex-direction:column;align-items:center;padding:20px 20px;width:100%;gap:16px;}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;}
.ctrl-label{font-size:13px;color:var(--muted);font-weight:600;}
.ctrl-input{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;width:80px;outline:none;text-align:center;}
.ctrl-input:focus{border-color:var(--red);}
.start-btn{padding:11px 28px;border:none;border-radius:13px;background:linear-gradient(90deg,#880022,var(--red));font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;color:#fff;cursor:pointer;letter-spacing:1px;transition:.2s;}
.start-btn:disabled{opacity:0.5;pointer-events:none;}
.start-btn:active{transform:scale(0.95);}
.status-bar{width:90%;max-width:360px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:10px 14px;text-align:center;font-size:13px;color:var(--muted);font-weight:600;}

/* MINES GRID — the main fix: explicit sizing so cells always show */
.mines-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  width:90%;
  max-width:360px;
}
/* Each cell: fixed size so it always renders */
.cell{
  width:100%;
  aspect-ratio:1/1;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  border:2px solid rgba(255,255,255,0.12);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  cursor:pointer;
  transition:all .2s;
  min-height:52px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);
}
.cell:hover{ background:rgba(255,255,255,0.14); border-color:rgba(255,255,255,0.25); transform:scale(1.04); }
.cell:active{ transform:scale(0.92); }
.cell.gem{
  background:rgba(0,255,136,0.18);
  border-color:var(--green);
  cursor:default;
  box-shadow:0 0 14px rgba(0,255,136,0.25);
}
.cell.mine{
  background:rgba(255,68,102,0.22);
  border-color:var(--red);
  cursor:default;
  animation:mineFlash .3s ease;
}
@keyframes mineFlash{0%,100%{background:rgba(255,68,102,0.22)}50%{background:rgba(255,68,102,0.5)}}
.cell.disabled{ pointer-events:none; }
.cell.inactive{ background:rgba(255,255,255,0.03); border-color:rgba(255,255,255,0.06); pointer-events:none; }

.multiplier-row{display:flex;align-items:center;gap:12px;justify-content:center;}
.mult-label{font-size:13px;color:var(--muted);font-weight:600;}
.mult-val{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:var(--green);}
.cashout-btn{padding:12px 24px;border:none;border-radius:13px;background:linear-gradient(90deg,#006644,var(--green));font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;color:#000;cursor:pointer;letter-spacing:1px;transition:.2s;}
.cashout-btn:disabled{opacity:0.4;pointer-events:none;}
.cashout-btn:active{transform:scale(0.95);}
.hist-wrap{width:90%;max-width:360px;margin-bottom:30px;}
.hist-title{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.hist-list{display:flex;flex-wrap:wrap;gap:6px;}
.h-chip{border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;font-family:'Orbitron',sans-serif;}
.h-w{background:rgba(0,255,136,0.12);color:var(--green);border:1px solid rgba(0,255,136,0.2);}
.h-l{background:rgba(255,68,102,0.12);color:var(--red);border:1px solid rgba(255,68,102,0.2);}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(10,10,20,0.95);border:1px solid var(--border);border-radius:14px;padding:10px 20px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.win{border-color:var(--green);color:var(--green);}
.toast.lose{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>
<header class="topbar">
  <div class="back-btn" onclick="location.href='index.html'">←</div>
  <div class="page-title">💣 Mines Game</div>
  <div class="bal-chip" id="balChip">🪙 0</div>
</header>
<div class="game-body">
  <div class="controls">
    <span class="ctrl-label">Bet:</span>
    <input type="number" class="ctrl-input" id="betAmt" value="10" min="1">
    <span class="ctrl-label">Mines:</span>
    <input type="number" class="ctrl-input" id="mineCount" value="3" min="1" max="20">
    <button class="start-btn" id="startBtn" onclick="startGame()">START</button>
  </div>

  <div class="status-bar" id="statusBar">Set your bet &amp; mines count, then press START</div>

  <div class="multiplier-row">
    <span class="mult-label">Multiplier:</span>
    <span class="mult-val" id="multVal">1.00x</span>
    <button class="cashout-btn" id="cashoutBtn" onclick="doCashout()" disabled>CASH OUT</button>
  </div>

  <!-- MINES GRID — 25 cells (5×5) -->
  <div class="mines-grid" id="minesGrid"></div>

  <div class="hist-wrap">
    <div class="hist-title">History</div>
    <div class="hist-list" id="histList"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyClNX5DPD55Lhj_N-UwfWtD5VssOZQZ9qw",
  authDomain:"lucky7-64a59.firebaseapp.com",
  projectId:"lucky7-64a59",
  storageBucket:"lucky7-64a59.firebasestorage.app",
  messagingSenderId:"950599334529",
  appId:"1:950599334529:web:ca04176afa45a923532b80"
});
var db = firebase.firestore();
var sessStr = localStorage.getItem('l7_current_user');
if (!sessStr) { location.replace('auth.html'); }
var currentUser; try { currentUser = JSON.parse(sessStr); } catch(e) { location.replace('auth.html'); }
var _balance = parseInt(localStorage.getItem('l7_balance') || '0');
function showBal() { document.getElementById('balChip').textContent = '🪙 ' + _balance; }
function walletDeduct(n) { _balance-=n; if(_balance<0)_balance=0; localStorage.setItem('l7_balance',String(_balance)); showBal(); return db.collection('users').doc(currentUser.id).update({wallet:firebase.firestore.FieldValue.increment(-n)}); }
function walletCredit(n) { _balance+=n; localStorage.setItem('l7_balance',String(_balance)); showBal(); return db.collection('users').doc(currentUser.id).update({wallet:firebase.firestore.FieldValue.increment(n)}); }
db.collection('users').doc(currentUser.id).onSnapshot(function(snap){ if(!snap.exists)return; _balance=snap.data().wallet||0; localStorage.setItem('l7_balance',String(_balance)); showBal(); });

var TOTAL       = 25;
var minePos     = [];
var gemsFound   = 0;
var betAmount   = 0;
var gameRunning = false;
var currentMult = 1.0;
showBal();

// Build the 5×5 grid immediately so it's always visible
(function buildGrid(){
  var grid = document.getElementById('minesGrid');
  grid.innerHTML = '';
  for (var i=0;i<TOTAL;i++) {
    var c = document.createElement('div');
    c.className = 'cell inactive';
    c.setAttribute('data-idx', i);
    grid.appendChild(c);
  }
})();

function startGame() {
  var bet   = parseInt(document.getElementById('betAmt').value)||10;
  var mines = parseInt(document.getElementById('mineCount').value)||3;
  if (bet<1||bet>_balance){ showToast('Not enough coins!','lose'); return; }
  if (mines<1||mines>20)  { showToast('Mines: 1–20','lose'); return; }

  betAmount   = bet;
  gemsFound   = 0;
  currentMult = 1.0;
  gameRunning = true;
  document.getElementById('multVal').textContent = '1.00x';
  document.getElementById('cashoutBtn').disabled = true;
  document.getElementById('startBtn').disabled   = true;
  document.getElementById('statusBar').textContent = '💣 Click tiles to reveal! Avoid mines!';

  walletDeduct(bet);

  // Place mines randomly
  minePos = [];
  var arr = [];
  for (var i=0;i<TOTAL;i++) arr.push(i);
  for (var m=0;m<mines;m++) {
    var idx = Math.floor(Math.random()*arr.length);
    minePos.push(arr[idx]); arr.splice(idx,1);
  }

  // Reset all cells
  document.querySelectorAll('.cell').forEach(function(c,i){
    c.className = 'cell';
    c.textContent = '';
    c.onclick = (function(idx){ return function(){ revealCell(idx); }; })(i);
  });
}

function revealCell(idx) {
  if (!gameRunning) return;
  var cell = document.querySelector('.cell[data-idx="'+idx+'"]');
  if (!cell || cell.classList.contains('gem') || cell.classList.contains('mine')) return;

  if (minePos.indexOf(idx) !== -1) {
    // BOOM
    cell.className = 'cell mine disabled';
    cell.textContent = '💣';
    gameRunning = false;
    // Reveal all mines
    minePos.forEach(function(mi){
      var mc = document.querySelector('.cell[data-idx="'+mi+'"]');
      if (mc && !mc.classList.contains('mine')) { mc.className='cell mine disabled'; mc.textContent='💣'; }
    });
    // Disable remaining
    document.querySelectorAll('.cell').forEach(function(c){ c.classList.add('disabled'); c.onclick=null; });
    document.getElementById('cashoutBtn').disabled = true;
    document.getElementById('startBtn').disabled   = false;
    document.getElementById('statusBar').textContent = '💥 BOOM! Mine hit! Lost 🪙'+betAmount;
    document.getElementById('multVal').textContent  = '0.00x';
    showToast('BOOM! Lost '+betAmount+' Coins','lose');
    addHist('-'+betAmount,false);
  } else {
    // GEM
    gemsFound++;
    cell.className = 'cell gem disabled';
    cell.textContent = '💎';
    cell.onclick = null;
    var safeTotal = TOTAL - minePos.length;
    // Multiplier increases with each safe reveal
    currentMult = parseFloat((Math.pow(TOTAL/(TOTAL-minePos.length), gemsFound)).toFixed(2));
    document.getElementById('multVal').textContent = currentMult.toFixed(2)+'x';
    document.getElementById('cashoutBtn').disabled = false;
    var potential = Math.floor(betAmount*currentMult);
    document.getElementById('statusBar').textContent = '💎 '+gemsFound+' gems! Potential: 🪙'+potential+' — Cash out or keep going!';
    if (gemsFound >= safeTotal) { doCashout(); } // all gems found
  }
}

function doCashout() {
  if (!gameRunning) return;
  gameRunning = false;
  var win = Math.floor(betAmount*currentMult);
  walletCredit(win);
  document.querySelectorAll('.cell').forEach(function(c){ c.classList.add('disabled'); c.onclick=null; });
  document.getElementById('cashoutBtn').disabled = true;
  document.getElementById('startBtn').disabled   = false;
  document.getElementById('statusBar').textContent = '✅ Cashed out at '+currentMult.toFixed(2)+'x! Won 🪙'+win;
  showToast('Cashed out! +'+win+' Coins 💰','win');
  addHist('+'+win,true);
}

function addHist(label,win){ var l=document.getElementById('histList'); var el=document.createElement('div'); el.className='h-chip '+(win?'h-w':'h-l'); el.textContent=label; l.prepend(el); if(l.children.length>10) l.removeChild(l.lastChild); }
function showToast(msg,type){ var t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+type+' show'; setTimeout(function(){ t.className='toast'; },2500); }
</script>
</body>
</html>
